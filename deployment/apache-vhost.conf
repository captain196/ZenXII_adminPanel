# ═══════════════════════════════════════════════════════════════════════════════
# Apache VirtualHost — GraderIQ School ERP
#
# Usage:
#   1. Copy this file to /etc/apache2/sites-available/grader.conf
#      (or C:\xampp\apache\conf\extra\ on Windows)
#   2. Replace school.example.com with your actual domain
#   3. Update certificate paths to match your SSL files
#   4. Enable: a2ensite grader && systemctl reload apache2
#
# Prerequisites:
#   sudo a2enmod rewrite ssl headers socache_shmcb
#   sudo systemctl restart apache2
# ═══════════════════════════════════════════════════════════════════════════════

# ── Port 80 → 301 redirect to HTTPS ──────────────────────────────────────────
<VirtualHost *:80>
    ServerName  school.example.com
    ServerAlias www.school.example.com

    # Redirect ALL traffic to HTTPS — no exceptions
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

# ── Port 443 — HTTPS (primary) ───────────────────────────────────────────────
<VirtualHost *:443>
    ServerName  school.example.com
    ServerAlias www.school.example.com
    DocumentRoot /var/www/html/Grader/school

    # ── SSL Configuration ─────────────────────────────────────────────────────
    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/school.example.com/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/school.example.com/privkey.pem

    # Modern SSL settings (TLS 1.2+ only, strong ciphers)
    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder     off
    SSLSessionTickets       off

    # OCSP Stapling (improves TLS handshake speed)
    SSLUseStapling          On
    SSLStaplingResponderTimeout 5
    SSLStaplingReturnResponderErrors off

    # ── Directory Configuration ───────────────────────────────────────────────
    <Directory /var/www/html/Grader/school>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # Prevent .env, .git, and sensitive file access
        <FilesMatch "\.(env|git|md|json|log|yml|yaml|xml|ini|bak|sql|sh)$">
            Require all denied
        </FilesMatch>
    </Directory>

    # Block direct access to application/ and vendor/ directories
    <DirectoryMatch "/var/www/html/Grader/school/(application|vendor|system)/">
        Require all denied
    </DirectoryMatch>

    # Allow only index.php and static assets
    <Directory /var/www/html/Grader/school/application/backups>
        Require all denied
    </Directory>

    # ── Security Headers (Apache level — supplements PHP headers) ─────────────
    <IfModule mod_headers.c>
        # HSTS — 1 year with includeSubDomains
        # Only add after confirming HTTPS works for at least 24 hours
        Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains" env=HTTPS

        # Prevent MIME-type sniffing attacks
        Header always set X-Content-Type-Options "nosniff"

        # Clickjacking protection (also set in PHP, belt-and-suspenders)
        Header always set X-Frame-Options "DENY"

        # Strip server version info
        Header always unset X-Powered-By
        Header always unset Server

        # Permissions Policy — disable unused browser APIs
        Header always set Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()"
    </IfModule>

    # ── Performance ───────────────────────────────────────────────────────────
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/css
        AddOutputFilterByType DEFLATE application/javascript application/json
        AddOutputFilterByType DEFLATE image/svg+xml
    </IfModule>

    <IfModule mod_expires.c>
        ExpiresActive On
        # Static assets — cache for 30 days
        ExpiresByType image/jpeg        "access plus 30 days"
        ExpiresByType image/png         "access plus 30 days"
        ExpiresByType image/gif         "access plus 30 days"
        ExpiresByType image/webp        "access plus 30 days"
        ExpiresByType image/svg+xml     "access plus 30 days"
        ExpiresByType text/css          "access plus 7 days"
        ExpiresByType application/javascript "access plus 7 days"
        ExpiresByType font/woff2        "access plus 30 days"

        # HTML/PHP — no cache (dynamic content)
        ExpiresByType text/html         "access plus 0 seconds"
    </IfModule>

    # ── Logging ───────────────────────────────────────────────────────────────
    ErrorLog  ${APACHE_LOG_DIR}/grader-error.log
    CustomLog ${APACHE_LOG_DIR}/grader-access.log combined
</VirtualHost>

# ── OCSP Stapling Cache (must be outside VirtualHost) ─────────────────────────
SSLStaplingCache shmcb:/var/run/ocsp(128000)
